<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بانٍ الحاسوب الذكي</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- زر تبديل اللغة -->
    <div class="lang-switcher">
        <button onclick="setLang('ar')" id="btn-ar" class="lang-btn active">العربية</button>
        <button onclick="setLang('en')" id="btn-en" class="lang-btn">English</button>
    </div>

    <!-- Header -->
    <header>
        <div class="header-icon">
            <i class="fas fa-desktop"></i>
        </div>
        <h1 data-ar="بانٍ الحاسوب الذكي" data-en="AI PC Builder">بانٍ الحاسوب الذكي</h1>
        <p data-ar="ابنِ حاسوبك المثالي باستخدام خوارزميات الذكاء الاصطناعي"
           data-en="Build your perfect PC using AI Search Algorithms">
           ابنِ حاسوبك المثالي باستخدام خوارزميات الذكاء الاصطناعي
        </p>
    </header>

    <div class="container">

        <!-- Form -->
        <div class="card" id="form-section">
            <h2>
                <i class="fas fa-sliders-h"></i>
                <span data-ar="إعداد البناء" data-en="Configure Your Build">إعداد البناء</span>
            </h2>

            <!-- Budget -->
            <div class="form-group">
                <label for="budget">
                    <i class="fas fa-dollar-sign"></i>
                    <span data-ar="الميزانية (دولار)" data-en="Budget (USD)">الميزانية (دولار)</span>
                </label>
                <input type="number" id="budget" min="300" max="10000"
                    data-placeholder-ar="مثال: 1500"
                    data-placeholder-en="e.g. 1500"
                    placeholder="مثال: 1500">
            </div>

            <!-- Purpose -->
            <div class="form-group">
                <label for="purpose">
                    <i class="fas fa-bullseye"></i>
                    <span data-ar="الغرض من الاستخدام" data-en="Purpose">الغرض من الاستخدام</span>
                </label>
                <select id="purpose">
                    <option value="" data-ar="-- اختر الغرض --" data-en="-- Select Purpose --">-- اختر الغرض --</option>
                    <option value="Gaming"           data-ar="🎮 الألعاب"                   data-en="🎮 Gaming">🎮 الألعاب</option>
                    <option value="Office"           data-ar="🖥️ المكتب / الاستخدام العام" data-en="🖥️ Office / General Use">🖥️ المكتب / الاستخدام العام</option>
                    <option value="Content Creation" data-ar="🎬 إنشاء المحتوى"            data-en="🎬 Content Creation">🎬 إنشاء المحتوى</option>
                    <option value="AI Workstation"   data-ar="🤖 محطة الذكاء الاصطناعي"   data-en="🤖 AI Workstation">🤖 محطة الذكاء الاصطناعي</option>
                    <option value="Budget Build"     data-ar="💰 البناء الاقتصادي"         data-en="💰 Budget Build">💰 البناء الاقتصادي</option>
                    <option value="High-End Build"   data-ar="🚀 البناء الاحترافي"         data-en="🚀 High-End Build">🚀 البناء الاحترافي</option>
                </select>
            </div>

            <!-- Algorithm -->
            <div class="form-group">
                <label for="algorithm">
                    <i class="fas fa-search"></i>
                    <span data-ar="خوارزمية البحث" data-en="Search Algorithm">خوارزمية البحث</span>
                </label>
                <select id="algorithm">
                    <option value="" data-ar="-- اختر الخوارزمية --" data-en="-- Select Algorithm --">-- اختر الخوارزمية --</option>
                    <option value="BFS" data-ar="BFS - البحث بالعرض أولاً"       data-en="BFS - Breadth First Search">BFS - البحث بالعرض أولاً</option>
                    <option value="DFS" data-ar="DFS - البحث بالعمق أولاً"       data-en="DFS - Depth First Search">DFS - البحث بالعمق أولاً</option>
                    <option value="UCS" data-ar="UCS - البحث بالتكلفة الموحدة"   data-en="UCS - Uniform Cost Search">UCS - البحث بالتكلفة الموحدة</option>
                    <option value="A*" data-ar="A* - البحث الأمثل الموجّه"       data-en="A* - Heuristic Search">A* - البحث الأمثل الموجّه</option>
                </select>
            </div>

            <!-- Currency -->
            <div class="form-group">
                <label for="currency">
                    <i class="fas fa-coins"></i>
                    <span data-ar="العملة" data-en="Currency">العملة</span>
                </label>
                <select id="currency" onchange="onCurrencyChange()">
                    <option value="OMR" data-ar="OMR (ريال عماني)" data-en="OMR">OMR (ريال عماني)</option>
                    <option value="USD" data-ar="USD (دولار)" data-en="USD">USD (دولار)</option>
                    <option value="EUR" data-ar="EUR (يورو)" data-en="EUR">EUR (يورو)</option>
                    <option value="SAR" data-ar="SAR (ريال سعودي)" data-en="SAR">SAR (ريال سعودي)</option>
                </select>
            </div>

            <button id="build-btn" onclick="buildPC()">
                <i class="fas fa-bolt"></i>
                <span data-ar="ابدأ البحث" data-en="Generate Build">ابدأ البحث</span>
            </button>
        </div>

        <!-- Loading -->
        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p data-ar="جارٍ البحث عن أفضل بناء..." data-en="Searching for the best build...">
                جارٍ البحث عن أفضل بناء...
            </p>
        </div>

        <!-- Error -->
        <div id="error-box" class="hidden card error-card">
            <i class="fas fa-exclamation-circle"></i>
            <p id="error-msg"></p>
        </div>

        <!-- Result -->
        <div id="result-section" class="hidden">
            <div id="build-options"></div>

            <button class="reset-btn" onclick="resetForm()">
                <i class="fas fa-redo"></i>
                <span data-ar="بناء جهاز آخر" data-en="Build Another PC">بناء جهاز آخر</span>
            </button>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
